<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test YouTube</title>
</head>
<body style="margin: 40px; font-family: Arial;">
    
    <h1>Test de YouTube Embed</h1>
    <p>Si ves un video de Rick Astley abajo, funciona:</p>
    
    <iframe 
        width="560" 
        height="315" 
        src="https://www.youtube.com/embed/uknBdO2Q_wM?si=Nrt21Pfrp9q0c8SP" 
        title="YouTube video player" 
        frameborder="0" 
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
        referrerpolicy="strict-origin-when-cross-origin" 
        allowfullscreen>
    </iframe>
    
    <hr style="margin: 40px 0;">
    
    <h2>Test 2: URL directa</h2>
    <p>Haz click en este enlace para ver si YouTube funciona:</p>
    <a href="https://www.youtube.com/embed/uknBdO2Q_wM?si=Nrt21Pfrp9q0c8SP" target="_blank">
        Abrir video en nueva pestaña
    </a>
    
    <hr style="margin: 40px 0;">
    
    <h2>Información de diagnóstico:</h2>
    <p><strong>Navegador:</strong> <span id="navegador"></span></p>
    <p><strong>Sistema:</strong> <span id="sistema"></span></p>
    
    <script>
        document.getElementById('navegador').textContent = navigator.userAgent;
        document.getElementById('sistema').textContent = navigator.platform;
    </script>
    
</body>
</html>
